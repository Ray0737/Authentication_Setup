<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Hub | Major Web</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Fonts: LINE Seed & Inter -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sunn-us/Lineseed-Sans-TH/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-black text-white" style="font-family: 'LINE Seed Sans TH', sans-serif;">
    <!-- Ultra-Minimalist Transparent Nav -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top py-4 bg-transparent">
        <div class="container px-4">
            <a class="navbar-brand fw-bold tracking-widest text-uppercase" href="#"
                style="font-size: 0.8rem; letter-spacing: 4px;">
                <span class="text-warning">●</span> Engineering_Roadmap
            </a>
            <div class="ms-auto d-flex align-items-center gap-4">
                <div class="d-flex align-items-center gap-2 pe-4 border-end border-white-10">
                    <a href="https://profilewebsiteprojecttrack.vercel.app/proj.html"
                        class="btn btn-outline-warning btn-sm rounded-circle d-flex align-items-center justify-content-center"
                        style="width: 32px; height: 32px; border-width: 1px; font-size: 0.8rem;" title="Projects">
                        <i class="bi bi-folder2-open"></i>
                    </a>
                    <a href="https://github.com/Ray0737" target="_blank"
                        class="btn btn-outline-warning btn-sm rounded-circle d-flex align-items-center justify-content-center"
                        style="width: 32px; height: 32px; border-width: 1px; font-size: 0.8rem;" title="GitHub">
                        <i class="bi bi-github"></i>
                    </a>
                </div>
                <div class="d-flex align-items-center gap-4 ps-2">
                    <a class="text-white fw-light text-uppercase tracking-widest text-decoration-none hover-warning d-flex align-items-center gap-2"
                        style="font-size: 0.8rem; letter-spacing: 4px;" href="authen/login.html">
                        <i class="bi bi-person-fill"></i> Login
                    </a>
                    <a class="btn btn-outline-light btn-xs text-uppercase fw-bold px-4 rounded-0 d-flex align-items-center gap-2"
                        style="font-size: 0.65rem; border-width: 2px; padding: 0.5rem 1.5rem;"
                        href="authen/register.html">
                        <i class="bi bi-person-plus-fill"></i> Register
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Full Hero Section -->
    <header class="hero-section" style="height: 100vh; overflow: hidden; position: relative;">
        <div class="hero-video-container" style="filter: grayscale(0.4) contrast(1.2) brightness(0.7); height: 100%;">
            <video autoplay muted loop playsinline class="w-100 h-100" style="object-fit: cover;">
                <source src="pic/bg2.mp4" type="video/mp4">
            </video>
            <div class="video-overlay"
                style="background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.9));"></div>
        </div>
    </header>


    <style>
        .tracking-multi {
            letter-spacing: -0.05em;
        }

        .hover-warning {
            transition: color 0.3s ease;
        }

        .hover-warning:hover {
            color: #ffc107 !important;
        }

        .animate-bounce {
            animation: bounce 2s infinite;
        }

        .transition-all {
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .hover-border-warning:hover {
            border-color: #ffc107 !important;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 193, 7, 0.1);
        }

        .hover-border-white:hover {
            border-color: #fff !important;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.05);
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-5px);
            }

            60% {
                transform: translateY(-3px);
            }
        }
    </style>
</body>

</html>
